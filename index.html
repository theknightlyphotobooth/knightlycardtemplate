<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Card Builder</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-dark: #080b0a;
            --gold: #dac386;
            --white: #ffffff;
            --olive: #847c57;
            --base-glow: #1d2523;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 380px;
            background: #0a0a0a;
            border-right: 1px solid #262626;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
        }

        .sidebar.collapsed {
            width: 0;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid #262626;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0a0a;
        }

        .logo {
            font-size: 18px;
            font-weight: 800;
            color: #f59e0b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .copy-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #f59e0b;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #fbbf24;
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .copy-btn.copied {
            background: #22c55e;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: #0a0a0a;
            border-bottom: 1px solid #262626;
            overflow-x: auto;
        }

        .tab {
            flex: 1;
            min-width: 70px;
            padding: 16px 8px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: #737373;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .tab svg {
            width: 16px;
            height: 16px;
        }

        .tab.active {
            color: #f59e0b;
            border-bottom-color: #f59e0b;
            background: rgba(245, 158, 11, 0.05);
        }

        /* Panel Content */
        .panel {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .panel-section {
            display: none;
        }

        .panel-section.active {
            display: block;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #737373;
            margin-bottom: 8px;
        }

        .text-input {
            width: 100%;
            padding: 12px 16px;
            background: #171717;
            border: 1px solid #262626;
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .text-input:focus {
            outline: none;
            border-color: #404040;
        }

        .slider-container {
            background: #171717;
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .slider-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #737373;
        }

        .slider-value {
            font-size: 10px;
            font-weight: 700;
            color: #f59e0b;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            background: #262626;
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #f59e0b;
            border-radius: 50%;
            cursor: pointer;
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .toggle-info h4 {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 2px;
        }

        .toggle-info p {
            font-size: 10px;
            color: #737373;
            text-transform: uppercase;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #262626;
            border-radius: 24px;
            transition: 0.3s;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: #737373;
            border-radius: 50%;
            transition: 0.3s;
        }

        input:checked + .toggle-slider {
            background: #f59e0b;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(20px);
            background: #000;
        }

        .color-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .color-input {
            background: #171717;
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 12px;
        }

        .color-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="color"] {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: none;
        }

        .color-hex {
            font-size: 11px;
            font-family: monospace;
            color: #a3a3a3;
            text-transform: uppercase;
        }

        .select-input {
            width: 100%;
            padding: 12px 16px;
            background: #171717;
            border: 1px solid #262626;
            border-radius: 12px;
            color: #fff;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
        }

        .visibility-grid {
            display: grid;
            gap: 12px;
        }

        /* Preview Area */
        .preview-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            position: relative;
        }

        .expand-btn {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #f59e0b;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 0 12px 12px 0;
            cursor: pointer;
            z-index: 10;
            display: none;
        }

        .expand-btn.visible {
            display: block;
        }

        .phone-frame {
            width: 375px;
            height: 780px;
            background: #000;
            border-radius: 50px;
            border: 12px solid #171717;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
            transition: transform 0.5s ease;
        }

        .phone-frame.expanded {
            transform: scale(1);
        }

        .phone-frame:not(.expanded) {
            transform: scale(0.85);
        }

        #preview-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #22c55e;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="app">
        <!-- Sidebar Controls -->
        <aside class="sidebar" id="sidebar">
            <div class="header">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                    Builder
                </div>
                <button class="copy-btn" id="copyBtn" onclick="copyHTML()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>

            <nav class="tabs">

                </button>
                <button class="tab" data-tab="motion">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 9 2 12 5 15"></polyline><polyline points="9 5 12 2 15 5"></polyline><polyline points="15 19 12 22 9 19"></polyline><polyline points="19 15 22 12 19 9"></polyline><line x1="2" y1="12" x2="22" y2="12"></line><line x1="12" y1="2" x2="12" y2="22"></line></svg>
                    Motion
                </button>
                <button class="tab" data-tab="fx">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
                    Effects
                </button>
                <button class="tab" data-tab="style">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5"></circle><circle cx="17.5" cy="10.5" r=".5"></circle><circle cx="8.5" cy="7.5" r=".5"></circle><circle cx="6.5" cy="12.5" r=".5"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.01 17.461 2 12 2z"></path></svg>
                    Theme
                </button>
                <button class="tab" data-tab="media">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    Media
                </button>
                <button class="tab" data-tab="vis">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    Vis
                </button>
            </nav>

            <div class="panel">
                <!-- Content Tab -->
                <div class="panel-section active" id="panel-content">
                    <div class="input-group">
                        <label class="input-label">Display Name</label>
                        <input type="text" class="text-input" id="input-name" value="Gabriel Knight" oninput="updateConfig()">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Luxury Tagline</label>
                        <input type="text" class="text-input" id="input-tagline" value="Luxury Photo Booths" oninput="updateConfig()">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Client Review</label>
                        <input type="text" class="text-input" id="input-review" value="Melbourne's bespoke experience." oninput="updateConfig()">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Footer Location</label>
                        <input type="text" class="text-input" id="input-footer" value="Melbourne • Victoria • Australia" oninput="updateConfig()">
                    </div>
                </div>

                <!-- Motion Tab -->
                <div class="panel-section" id="panel-motion">
                    <div class="slider-container">
                        <div class="slider-header">
                            <span class="slider-label">Pause Front (s)</span>
                            <span class="slider-value" id="val-front">3s</span>
                        </div>
                        <input type="range" min="0" max="10" step="0.5" value="3" id="slider-front" oninput="updateConfig()">
                    </div>
                    <div class="slider-container">
                        <div class="slider-header">
                            <span class="slider-label">Pause Back (s)</span>
                            <span class="slider-value" id="val-back">2s</span>
                        </div>
                        <input type="range" min="0" max="10" step="0.5" value="2" id="slider-back" oninput="updateConfig()">
                    </div>
                    <div class="toggle-row">
                        <div class="toggle-info">
                            <h4>3D Tilt</h4>
                            <p>Interactive parallax</p>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" id="toggle-tilt" checked onchange="updateConfig()">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>

                <!-- Effects Tab -->
                <div class="panel-section" id="panel-fx">
                    <div class="slider-container">
                        <div class="slider-header">
                            <span class="slider-label">Outer Glow</span>
                            <span class="slider-value" id="val-glow">40px</span>
                        </div>
                        <input type="range" min="0" max="150" step="5" value="40" id="slider-glow" oninput="updateConfig()">
                    </div>
                    <div class="toggle-row">
                        <div class="toggle-info">
                            <h4>Light Sweep</h4>
                            <p>Shimmer effect</p>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" id="toggle-sweep" checked onchange="updateConfig()">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Background Effect</label>
                        <select class="select-input" id="select-bg" onchange="updateConfig()">
                            <option value="bokeh">Luxury Bokeh</option>
                            <option value="glitter">Golden Rain</option>
                            <option value="none">None</option>
                        </select>
                    </div>
                </div>

                <!-- Style Tab -->
                <div class="panel-section" id="panel-style">
                    <div class="color-grid">
                        <div class="color-input">
                            <label class="input-label">BG Color</label>
                            <div class="color-row">
                                <input type="color" id="color-bg" value="#080b0a" oninput="updateConfig()">
                                <span class="color-hex" id="hex-bg">#080b0a</span>
                            </div>
                        </div>
                        <div class="color-input">
                            <label class="input-label">Accent Gold</label>
                            <div class="color-row">
                                <input type="color" id="color-gold" value="#dac386" oninput="updateConfig()">
                                <span class="color-hex" id="hex-gold">#dac386</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Media Tab -->
                <div class="panel-section" id="panel-media">
                    <div class="input-group">
                        <label class="input-label">Logo URL</label>
                        <input type="text" class="text-input" id="input-logo" value="https://raw.githubusercontent.com/theknightlyphotobooth/Images-/194d47a8ad24d9fef8e9d6f9c3a28f9fad5fc1e5/the%20knightly%20logo.png" oninput="updateConfig()">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Profile Photo URL</label>
                        <input type="text" class="text-input" id="input-profile" value="https://raw.githubusercontent.com/theknightlyphotobooth/Images-/3187354caa0a71d12c7dd353c29e0f0cc30e53eb/Gabriel%20Knight.png" oninput="updateConfig()">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Coin Back URL</label>
                        <input type="text" class="text-input" id="input-coin" value="https://raw.githubusercontent.com/theknightlyphotobooth/Images-/01668a04aceed0bceecc35b363e5115693d4dd63/Back.jpg" oninput="updateConfig()">
                    </div>
                </div>

                <!-- Visibility Tab -->
                <div class="panel-section" id="panel-vis">
                    <div class="visibility-grid">
                        <div class="toggle-row">
                            <div class="toggle-info"><h4>Tagline</h4></div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="vis-tagline" checked onchange="updateConfig()">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="toggle-row">
                            <div class="toggle-info"><h4>Stars</h4></div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="vis-stars" checked onchange="updateConfig()">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="toggle-row">
                            <div class="toggle-info"><h4>Review</h4></div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="vis-review" checked onchange="updateConfig()">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="toggle-row">
                            <div class="toggle-info"><h4>Quote Button</h4></div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="vis-quote" checked onchange="updateConfig()">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="toggle-row">
                            <div class="toggle-info"><h4>Save Button</h4></div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="vis-save" checked onchange="updateConfig()">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="toggle-row">
                            <div class="toggle-info"><h4>Call Button</h4></div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="vis-call" checked onchange="updateConfig()">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="toggle-row">
                            <div class="toggle-info"><h4>SMS Button</h4></div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="vis-sms" checked onchange="updateConfig()">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="toggle-row">
                            <div class="toggle-info"><h4>Social Button</h4></div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="vis-social" checked onchange="updateConfig()">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="toggle-row">
                            <div class="toggle-info"><h4>Footer</h4></div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="vis-footer" checked onchange="updateConfig()">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="toggle-row">
                            <div class="toggle-info"><h4>Profile Photo</h4></div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="vis-profile" checked onchange="updateConfig()">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Preview Area -->
        <main class="preview-area">
            <button class="expand-btn visible" id="expandBtn" onclick="toggleSidebar()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
            </button>

            <div class="phone-frame" id="phoneFrame">
                <iframe id="preview-frame"></iframe>
            </div>
        </main>
    </div>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel-section').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
            });
        });

        // Toggle sidebar
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('phoneFrame').classList.toggle('expanded');
            document.getElementById('expandBtn').classList.toggle('visible');
        }

        // Generate card HTML
        function generateCardHTML() {
            const config = {
                name: document.getElementById('input-name').value,
                tagline: document.getElementById('input-tagline').value,
                review: document.getElementById('input-review').value,
                footer: document.getElementById('input-footer').value,
                spinPauseFront: parseFloat(document.getElementById('slider-front').value),
                spinPauseBack: parseFloat(document.getElementById('slider-back').value),
                enableTilt: document.getElementById('toggle-tilt').checked,
                glowStrength: document.getElementById('slider-glow').value,
                enableSweep: document.getElementById('toggle-sweep').checked,
                bgEffect: document.getElementById('select-bg').value,
                colors: {
                    bgDark: document.getElementById('color-bg').value,
                    gold: document.getElementById('color-gold').value,
                    white: "#ffffff",
                    olive: "#847c57",
                    baseGlow: "#1d2523"
                },
                images: {
                    logo: document.getElementById('input-logo').value,
                    profilePhoto: document.getElementById('input-profile').value,
                    coinBack: document.getElementById('input-coin').value
                },
                visibility: {
                    tagline: document.getElementById('vis-tagline').checked,
                    stars: document.getElementById('vis-stars').checked,
                    review: document.getElementById('vis-review').checked,
                    quoteBtn: document.getElementById('vis-quote').checked,
                    saveBtn: document.getElementById('vis-save').checked,
                    callBtn: document.getElementById('vis-call').checked,
                    smsBtn: document.getElementById('vis-sms').checked,
                    socialBtn: document.getElementById('vis-social').checked,
                    footer: document.getElementById('vis-footer').checked,
                    profilePhoto: document.getElementById('vis-profile').checked
                }
            };

            const totalDuration = 12;
            const flipTime = 1.2;
            const frontPausePct = (config.spinPauseFront / totalDuration) * 100;
            const backPausePct = (config.spinPauseBack / totalDuration) * 100;
            const flipPct = (flipTime / totalDuration) * 100;
            const k1 = frontPausePct;
            const k2 = k1 + flipPct;

            return `<!DOCTYPE html>

        .logo-wrap { margin-bottom: 20px; transform: translateZ(40px); }

        .user-title { font-size: 20px; font-weight: 800; transform: translateZ(50px); margin-bottom: 6px; letter-spacing: -0.5px; }

<body>

    <script>
        function nav(u) {

                const x = (window.innerWidth / 2 - e.pageX) / 25;
                const y = (window.innerHeight / 2 - e.pageY) / 25;
                tilt.style.transform = \`rotateY(\${-x}deg) rotateX(\${y}deg)\`;
            });
        }
        window.addEventListener('deviceorientation', (e) => {
            if (e.beta && e.gamma) {
                const x = Math.min(Math.max(e.gamma, -30), 30) / 3;
                const y = Math.min(Math.max(e.beta - 45, -30), 30) / 3;
                tilt.style.transform = \`rotateY(\${x}deg) rotateX(\${-y}deg)\`;
            }
        }, true);
        ` : ''}

        function initFX() {
            const canvas = document.getElementById('bg-canvas');
            const mode = "${config.bgEffect}";
            if(mode === 'none') return;
            const count = window.innerWidth < 600 ? 25 : 40;
            for(let i=0; i<count; i++) {
                const p = document.createElement('div');
                p.className = 'p';
                const size = Math.random() * (mode === 'bokeh' ? 60 : 3) + 2;
                p.style.width = p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                p.style.background = mode === 'bokeh' ? 'var(--base-glow)' : 'var(--gold)';
                if(mode === 'bokeh') {
                    p.style.filter = 'blur(20px)';
                    p.style.setProperty('--tx', (Math.random()-0.5)*200+'px');
                    p.style.setProperty('--ty', (Math.random()-0.5)*200+'px');
                    p.style.animation = \`bokeh \${Math.random()*10+10}s linear infinite\`;
                } else {
                    p.style.boxShadow = '0 0 10px var(--gold)';
                    p.style.animation = \`goldRain \${Math.random()*4+3}s linear infinite\`;
                    p.style.animationDelay = Math.random()*5+'s';
                }
                canvas.appendChild(p);
            }
        }
        window.onload = initFX;

        function saveV() {
            const v = ["BEGIN:VCARD", "VERSION:3.0", "FN:${config.name}", "ORG:${config.tagline}", "TEL:+61422730144", "EMAIL:hello@knightlyphotobooth.com.au", "URL:https://knightlyphotobooth.com.au", "END:VCARD"].join("\r\n");

            const u = URL.createObjectURL(b);
            const l = document.createElement('a'); l.href = u; l.download = "${config.name.replace(/\s+/g, '_')}.vcf"; l.click();
        }
    <\/script>
</body>

            document.getElementById('hex-bg').textContent = document.getElementById('color-bg').value;
            document.getElementById('hex-gold').textContent = document.getElementById('color-gold').value;

            // Update iframe
            const html = generateCardHTML();
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-frame').src = url;
        }

        // Copy HTML to clipboard
        function copyHTML() {
            const html = generateCardHTML();
            navigator.clipboard.writeText(html).then(() => {
                const btn = document.getElementById('copyBtn');
                const toast = document.getElementById('toast');
                btn.classList.add('copied');
                btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!';
                toast.classList.add('show');

                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Get HTML';
                    toast.classList.remove('show');
                }, 2000);
            });
        }

        // Initial load
        updateConfig();
    </script>

</html>
